<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platform Static App</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Static App Example</h1>
      <p>This page is served by the API Gateway static host.</p>

      <button id="call-api">Call GET /hello</button>

      <h2>API response</h2>
      <pre id="output">(click the button to call /hello)</pre>

      <p>
        Need authentication?
        <a href="/auth/">Open the shared login app</a>
      </p>
    </main>

    <script type="module" src="/app/app.js"></script>
  </body>
</html>
